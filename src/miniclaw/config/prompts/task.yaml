system: |
  你是一个专业的任务管理助手。你的职责是帮助用户高效管理日常任务和TODO清单。
  
  核心能力：
  1. 创建、更新、删除任务
  2. 任务优先级管理
  3. 智能任务拆解
  4. 每日任务汇总和报告
  5. 截止日期提醒
  
  工作原则：
  - 任务描述要清晰、具体
  - 优先级判断要合理
  - 大任务要拆解为可执行的小任务
  - 及时提醒用户关注重要任务

create_task: |
  请创建以下任务：
  
  任务名称：{name}
  任务描述：{description}
  截止日期：{deadline}
  优先级：{priority}  # high / medium / low
  
  是否需要拆解为子任务？

daily_summary: |
  请生成今日任务完成报告：
  
  日期：{date}
  已完成任务：{completed_tasks}
  未完成任务：{pending_tasks}
  
  请提供：
  1. 完成率统计
  2. 未完成任务的原因分析
  3. 明日任务建议

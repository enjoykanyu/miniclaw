# MiniClaw Skills Manifest
# Defines available skills and their configurations

skills:
  - name: weather
    description: "天气查询技能，获取天气信息和出行建议"
    version: "1.0.0"
    enabled: true
    functions:
      - name: get_weather
        description: "获取指定城市的天气信息"
        parameters:
          city:
            type: string
            description: "城市名称"
            required: true
      - name: get_forecast
        description: "获取天气预报"
        parameters:
          city:
            type: string
            required: true
          days:
            type: integer
            default: 3
      - name: get_suggestion
        description: "获取出行建议"
        parameters:
          city:
            type: string
            required: true

  - name: news
    description: "新闻推送技能，获取最新新闻和摘要"
    version: "1.0.0"
    enabled: true
    functions:
      - name: get_headlines
        description: "获取新闻头条"
      - name: search_news
        description: "搜索新闻"
      - name: get_digest
        description: "获取新闻摘要"

  - name: reminder
    description: "提醒管理技能，创建和管理提醒事项"
    version: "1.0.0"
    enabled: true
    functions:
      - name: create_reminder
        description: "创建提醒"
      - name: list_reminders
        description: "列出所有提醒"
      - name: delete_reminder
        description: "删除提醒"

  - name: pdf
    description: "PDF处理技能，读取和总结PDF文档"
    version: "1.0.0"
    enabled: true
    functions:
      - name: read_pdf
        description: "读取PDF文件"
      - name: summarize_pdf
        description: "总结PDF内容"
      - name: query_pdf
        description: "对PDF提问"

  - name: summary
    description: "内容总结技能，总结文本和提取关键点"
    version: "1.0.0"
    enabled: true
    functions:
      - name: summarize_text
        description: "总结文本"
      - name: key_points
        description: "提取关键点"
      - name: extract_summary
        description: "提取摘要"

  - name: emotion
    description: "情感分析技能，分析文本情感和生成情感回复"
    version: "1.0.0"
    enabled: true
    functions:
      - name: analyze
        description: "分析情感"
      - name: get_sentiment
        description: "获取情感倾向"
      - name: emotion_reply
        description: "生成情感回复"

  - name: joke
    description: "笑话娱乐技能，提供笑话、谜语和趣闻"
    version: "1.0.0"
    enabled: true
    functions:
      - name: get_joke
        description: "获取笑话"
      - name: get_riddle
        description: "获取谜语"
      - name: get_fun_fact
        description: "获取趣闻"

  - name: calendar
    description: "日历管理技能，管理日程和查询节假日"
    version: "1.0.0"
    enabled: true
    functions:
      - name: get_today
        description: "获取今日信息"
      - name: add_event
        description: "添加日程"
      - name: get_holidays
        description: "获取节假日"
      - name: days_until
        description: "计算距离天数"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid pattern -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d8c8f0" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)"/>

  <!-- Circuit lines -->
  <g stroke="#b794f6" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 50 80 L 80 80 L 80 120 L 110 120"/>
    <circle cx="50" cy="80" r="4" fill="#b794f6"/>
    <circle cx="110" cy="120" r="4" fill="#b794f6"/>
    <path d="M 350 100 L 320 100 L 320 140 L 290 140"/>
    <circle cx="350" cy="100" r="4" fill="#b794f6"/>
    <circle cx="290" cy="140" r="4" fill="#b794f6"/>
    <path d="M 60 320 L 90 320 L 90 280 L 120 280"/>
    <circle cx="60" cy="320" r="4" fill="#b794f6"/>
    <circle cx="120" cy="280" r="4" fill="#b794f6"/>
    <path d="M 340 300 L 310 300 L 310 260 L 280 260"/>
    <circle cx="340" cy="300" r="4" fill="#b794f6"/>
    <circle cx="280" cy="260" r="4" fill="#b794f6"/>
  </g>

  <!-- Robot body -->
  <g transform="translate(200, 220)">
    <!-- Body -->
    <rect x="-60" y="-20" width="120" height="80" rx="15" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="3"/>
    <rect x="-50" y="-10" width="100" height="50" rx="10" fill="#f3e8ff" opacity="0.3"/>

    <!-- Arms -->
    <g transform="translate(-75, 10)">
      <rect x="-15" y="-8" width="30" height="50" rx="8" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="3"/>
      <circle cx="0" cy="35" r="12" fill="#a855f7" stroke="#6d28d9" stroke-width="2"/>
      <circle cx="0" cy="35" r="5" fill="#f3e8ff"/>
    </g>
    <g transform="translate(75, 10)">
      <rect x="-15" y="-8" width="30" height="50" rx="8" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="3"/>
      <circle cx="0" cy="35" r="12" fill="#a855f7" stroke="#6d28d9" stroke-width="2"/>
      <circle cx="0" cy="35" r="5" fill="#f3e8ff"/>
    </g>

    <!-- Gear -->
    <g transform="translate(0, 25)">
      <circle r="28" fill="#e9d5ff" stroke="#7c3aed" stroke-width="3"/>
      <circle r="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
      <circle r="8" fill="#a855f7"/>
      <g stroke="#7c3aed" stroke-width="4" stroke-linecap="round">
        <line y1="-32" y2="-24"/>
        <line y1="32" y2="24"/>
        <line x1="-32" x2="-24"/>
        <line x1="32" x2="24"/>
        <line x1="-22" y1="-22" x2="-17" y2="-17"/>
        <line x1="22" y1="-22" x2="17" y2="-17"/>
        <line x1="-22" y1="22" x2="-17" y2="17"/>
        <line x1="22" y1="22" x2="17" y2="17"/>
      </g>
    </g>

    <!-- Wrench -->
    <g transform="translate(45, 30) rotate(-30)">
      <rect x="-6" y="-25" width="12" height="35" rx="3" fill="#c084fc" stroke="#7c3aed" stroke-width="2"/>
      <path d="M -12 -25 L 12 -25 L 8 -45 L -8 -45 Z" fill="#a855f7" stroke="#7c3aed" stroke-width="2"/>
      <rect x="-4" y="-38" width="8" height="10" rx="2" fill="#f3e8ff"/>
    </g>
  </g>

  <!-- Robot head -->
  <g transform="translate(200, 130)">
    <!-- Antenna -->
    <line x1="0" y1="-55" x2="0" y2="-35" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-55" r="8" fill="#a855f7" stroke="#6d28d9" stroke-width="2"/>
    <circle cx="0" cy="-55" r="3" fill="#f3e8ff"/>

    <!-- Head shape -->
    <rect x="-55" y="-35" width="110" height="90" rx="25" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="3"/>

    <!-- Face area -->
    <rect x="-45" y="-25" width="90" height="70" rx="18" fill="#f3e8ff" stroke="#ddd6fe" stroke-width="2"/>

    <!-- Visor/Eyes background -->
    <rect x="-38" y="-12" width="76" height="32" rx="12" fill="url(#visorGrad)" stroke="#7c3aed" stroke-width="2"/>

    <!-- Eyes -->
    <g filter="url(#glow)">
      <circle cx="-18" cy="4" r="10" fill="#f3e8ff"/>
      <circle cx="-18" cy="4" r="6" fill="#a855f7"/>
      <circle cx="-16" cy="2" r="3" fill="#f3e8ff"/>

      <circle cx="18" cy="4" r="10" fill="#f3e8ff"/>
      <circle cx="18" cy="4" r="6" fill="#a855f7"/>
      <circle cx="20" cy="2" r="3" fill="#f3e8ff"/>
    </g>

    <!-- Smile -->
    <path d="M -15 22 Q 0 32 15 22" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

    <!-- Ears -->
    <rect x="-68" y="-5" width="16" height="30" rx="8" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="2"/>
    <rect x="52" y="-5" width="16" height="30" rx="8" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="2"/>
  </g>

  <!-- Neck -->
  <rect x="188" y="185" width="24" height="20" rx="5" fill="url(#robotGrad)" stroke="#6d28d9" stroke-width="2"/>
</svg>